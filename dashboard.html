<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flare Bot — Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0d0d0d;
            color: #dcddde;
            min-height: 100vh;
        }
        .navbar {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h1 { font-size: 20px; color: #fff; }
        .navbar h1 span { color: #5865f2; }
        .logout-btn {
            padding: 8px 20px;
            background: rgba(237,66,69,0.15);
            border: 1px solid rgba(237,66,69,0.3);
            color: #ed4245;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .logout-btn:hover { background: rgba(237,66,69,0.25); }
        .container { max-width: 1200px; margin: 0 auto; padding: 32px; }
        .section-title {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #72767d;
            margin-bottom: 16px;
        }
        .guilds-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .guild-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .guild-card:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(88,101,242,0.3);
            transform: translateY(-2px);
        }
        .guild-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #5865f2, #4752c4);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 12px;
        }
        .guild-name {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }
        .guild-id {
            font-size: 12px;
            color: #72767d;
            font-family: 'SF Mono', monospace;
        }
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #72767d;
        }
        .empty-state h2 { color: #fff; margin-bottom: 8px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1>🔥 <span>Flare</span> Bot Panel</h1>
        <a href="{{ url_for('logout') }}" class="logout-btn">Logout</a>
    </nav>
    <div class="container">
        <div class="section-title">Servers</div>
        {% if guild_ids %}
        <div class="guilds-grid">
            {% for gid in guild_ids %}
            <a href="{{ url_for('guild_detail', guild_id=gid) }}" class="guild-card">
                <div class="guild-icon">🖥️</div>
                <div class="guild-name">Server {{ gid }}</div>
                <div class="guild-id">ID: {{ gid }}</div>
            </a>
            {% endfor %}
        </div>
        {% else %}
        <div class="empty-state">
            <h2>No servers yet</h2>
            <p>Configure the bot on a Discord server first.</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
