<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Панель управления ботом{% endblock %}</title>
<style>
  :root {
    --bg: #0f1115; --panel: #1a1d24; --panel2: #21252e; --border: #2c313c;
    --text: #e6e8eb; --muted: #9aa2ad; --accent: #5865F2; --accent2: #4752c4;
    --green: #3ba55c; --red: #ed4245; --yellow: #faa61a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text);
  }
  header {
    background: var(--panel); padding: 16px 28px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  header a { color: var(--text); text-decoration: none; font-weight: 600; font-size: 18px; }
  header a.logout { color: var(--muted); font-weight: 400; font-size: 14px; }
  main { max-width: 900px; margin: 32px auto; padding: 0 20px; }
  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 22px; margin-bottom: 20px;
  }
  h2 { margin-top: 0; font-size: 17px; color: var(--text); }
  label { display: block; margin: 12px 0 4px; font-size: 13px; color: var(--muted); }
  input[type=text], input[type=number], input[type=password], select, textarea {
    width: 100%; padding: 9px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--panel2); color: var(--text); font-size: 14px;
  }
  textarea { min-height: 70px; resize: vertical; }
  .checkbox-row { display: flex; align-items: center; gap: 8px; margin-top: 14px; }
  .checkbox-row input { width: auto; }
  button, .btn {
    background: var(--accent); color: #fff; border: none; padding: 9px 18px;
    border-radius: 6px; font-size: 14px; cursor: pointer; margin-top: 16px; display: inline-block;
    text-decoration: none;
  }
  button:hover, .btn:hover { background: var(--accent2); }
  button.danger { background: var(--red); padding: 5px 10px; font-size: 12px; margin-top: 0; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
  th, td { text-align: left; padding: 8px 6px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; }
  .guild-list a {
    display: block; padding: 14px 16px; background: var(--panel2); border-radius: 8px;
    color: var(--text); text-decoration: none; margin-bottom: 10px; border: 1px solid var(--border);
  }
  .guild-list a:hover { border-color: var(--accent); }
  .flash { background: var(--green); color: #fff; padding: 10px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 14px; }
  .muted { color: var(--muted); font-size: 13px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; background: var(--panel2); border: 1px solid var(--border); }
</style>
</head>
<body>
<header>
  <a href="{{ url_for('dashboard') }}">🤖 Панель управления ботом</a>
  {% if session.get('logged_in') %}<a class="logout" href="{{ url_for('logout') }}">Выйти / Logout</a>{% endif %}
</header>
<main>
  {% with messages = get_flashed_messages() %}
    {% if messages %}{% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}{% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
